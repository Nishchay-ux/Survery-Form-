<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Survey Form</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1 id="title">Survey Form</h1>
        <p id="description"><i>Thank you for taking your time to help us improve the platform</i></p>
        <main class="form-container">
            <form class="survey-form" id="survey-form">
                <fieldset>
                    <label id="name-label" for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder=" Enter your name" required />
                    <label id="email-label" for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder=" Enter your Email" required/>
                    <label id="number-label" for="number">Age (optional)</label>
                    <input type="number" id="number" name="age" placeholder="  Age" min="13" max="120" />
                    <label for="dropdown">What describes you the most?</label>
                    <select id="dropdown" name="dropdown">
                            <option disabled selected value>Select an option</option>
                            <option value="student">Student</option>
                            <option value="learner">Full time lerner</option>
                            <option value="job">Full time job</option>
                            <option value="preferNo">Prefer not to say</option>
                    </select>
                </fieldset>
                <fieldset>
                    <legend>Would you recommend us to a friend?</legend>
                    <label for="definitely"><input type="radio" id="definitely" name="recommendation" value="definitely" class="inline" checked/> Definitely</label>
                    <label for="not-sure"><input type="radio" id="not-sure" name="recommendation" value="not-sure" class="inline"/> Not Sure</label>
                    <label for="maybe"><input type="radio" id="maybe" name="recommendation" value="maybe" class="inline"/> Maybe</label>
                    
                </fieldset>
                <fieldset>
                    <legend>What would you like to see improved?</legend>
                    <label for="front-end"><input id="front-end" type="checkbox" name="improvement[]" value="front-end" class="inline"/> Front-End Projects</label>
                    <label for="back-end"><input id="back-end" name="improvement[]" type="checkbox" value="back-end" class="inline"/> Back-End Projects</label>
                    <label for="data-visualisation"><input id="data-visualisation" name="improvement[]" type="checkbox" value="data-visualisation" class="inline"/> Data Visualization</label>
                    <label for="videos"><input id="videos" name="improvement[]" type="checkbox" value="videos" class="inline"/> Videos</label>
                    <label for="forums"><input id="forums" name="improvement[]" type="checkbox" value="forums" class="inline"/> Forums</label>
                    <label for="add-courses"><input id="add-courses" name="improvement[]" type="checkbox" value="add-courses" class="inline"/> Additional Courses</label>
                </fieldset> 
                <fieldset>
                    <label for="feedback">Any comment or suggestions?</label>
                    <textarea id="feedback" name="comments-or-suggestions" placeholder="Enter your suggestions here..." rows="4"></textarea>
                </fieldset>
                <input id="submit" type="submit" class="submit-button" />
            </form>
        </main>
    </body>
</html>
